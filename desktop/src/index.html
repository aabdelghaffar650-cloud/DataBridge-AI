<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DataBridge AI</title>
  <style>
    html,body{margin:0;width:100%;height:100%;background:#080810;color:#f4f4f7;font-family:Inter,Arial,sans-serif}
    .wrap{height:100vh;display:grid;place-items:center}
    .card{width:420px;border:1px solid #13132a;background:#0c0c1e;border-radius:16px;padding:30px 34px;box-shadow:none}
    .brand{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#8b8ba7;margin-bottom:10px}
    .title{font-size:24px;font-weight:750;margin-bottom:10px}
    .text{font-size:13px;color:#8b8ba7;line-height:1.7}
    .hint{margin-top:12px;font-size:12px;color:#5f5f78}
    .bar{margin-top:22px;height:4px;background:#13132a;border-radius:999px;overflow:hidden}
    .bar div{height:100%;width:38%;background:#7c6aff;animation:move 1.4s infinite ease-in-out}
    @keyframes move{0%{transform:translateX(-130%)}100%{transform:translateX(320%)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">DataBridge AI</div>
      <div class="title">Starting workspace</div>
      <div class="text">Loading the local analytics engine and preparing the secure desktop session.</div>
      <div class="hint">First launch can take longer while Python libraries initialize.</div>
      <div class="bar"><div></div></div>
    </div>
  </div>
</body>
</html>
